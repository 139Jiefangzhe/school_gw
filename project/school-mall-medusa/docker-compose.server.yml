name: school-mall-medusa-stg

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: school_mall
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: school_mall
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U school_mall -d school_mall"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  medusa:
    image: school-mall-medusa-stg:latest
    build:
      context: .
      dockerfile: Dockerfile.staging
      args:
        MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL}
    restart: unless-stopped
    ports:
      - "19000:9000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://school_mall:${DB_PASSWORD}@postgres:5432/school_mall
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      STORE_CORS: ${STORE_CORS}
      ADMIN_CORS: ${ADMIN_CORS}
      AUTH_CORS: ${AUTH_CORS}
      MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_SAME_SITE: ${SESSION_COOKIE_SAME_SITE:-lax}
      DISABLE_MEDUSA_ADMIN: "false"
      WECHAT_APPID: ${WECHAT_APPID}
      WECHAT_APPSECRET: ${WECHAT_APPSECRET}
      WECHAT_MCH_ID: ${WECHAT_MCH_ID}
      WECHAT_MCH_KEY: ${WECHAT_MCH_KEY}
      WECHAT_NOTIFY_URL: ${WECHAT_NOTIFY_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
